<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duality — Klingon × Predator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --klingon-bronze: #8b5a2b;
      --klingon-dark: #3d2814;
      --predator-green: #4a6b52;
      --predator-glow: #7cff9e;
      --seam: #ff6b35;
      --bg-deep: #050508;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #c8c4bc;
      cursor: crosshair;
    }

    #stage {
      position: fixed;
      inset: 0;
      perspective: 1200px;
      perspective-origin: 50% 45%;
    }

    .layer {
      position: absolute;
      inset: 0;
      will-change: transform;
      pointer-events: none;
    }

    /* —— Background nebula —— */
    #bg-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* —— Mid parallax smoke / debris —— */
    #smoke-canvas {
      width: 100%;
      height: 100%;
      opacity: 0.55;
      mix-blend-mode: screen;
    }

    /* —— Character stack (2.5D) —— */
    #character-wrap {
      position: absolute;
      left: 50%;
      top: 52%;
      width: min(92vw, 720px);
      height: min(88vh, 900px);
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
      pointer-events: none;
    }

    #character-shadow {
      position: absolute;
      bottom: 8%;
      left: 50%;
      width: 70%;
      height: 12%;
      transform: translateX(-50%) rotateX(75deg);
      background: radial-gradient(ellipse, rgba(0,0,0,0.75) 0%, transparent 70%);
      filter: blur(20px);
    }

    #hero-canvas {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 0 60px rgba(255, 100, 40, 0.15))
              drop-shadow(0 0 80px rgba(80, 200, 120, 0.12));
    }

    /* —— Foreground rim light plane —— */
    #rim-light {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(105deg, rgba(255, 140, 60, 0.12) 0%, transparent 42%),
        linear-gradient(285deg, rgba(100, 255, 160, 0.1) 0%, transparent 42%);
      mix-blend-mode: overlay;
    }

    /* —— Center seam energy —— */
    #seam-glow {
      position: absolute;
      left: 50%;
      top: 12%;
      width: 4px;
      height: 76%;
      transform: translateX(-50%);
      background: linear-gradient(180deg,
        transparent 0%,
        var(--seam) 15%,
        #fff 50%,
        var(--seam) 85%,
        transparent 100%);
      box-shadow: 0 0 20px var(--seam), 0 0 60px rgba(255, 107, 53, 0.5);
      opacity: 0.85;
      animation: seamPulse 3s ease-in-out infinite;
    }

    @keyframes seamPulse {
      0%, 100% { opacity: 0.6; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.4); }
    }

    /* —— Particles foreground —— */
    #particles-canvas {
      width: 100%;
      height: 100%;
      mix-blend-mode: plus-lighter;
    }

    /* —— UI overlay —— */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1rem, 3vw, 2.5rem);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    h1 {
      font-size: clamp(0.65rem, 1.4vw, 0.75rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      font-weight: 300;
      color: rgba(200, 196, 188, 0.5);
    }

    .tag {
      font-size: clamp(0.6rem, 1.2vw, 0.7rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.35em 0.8em;
      border: 1px solid rgba(255, 107, 53, 0.35);
      color: var(--seam);
    }

    footer {
      display: flex;
      gap: 2rem;
      align-items: flex-end;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: clamp(0.65rem, 1.3vw, 0.72rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .swatch {
      width: 24px;
      height: 3px;
    }

    .swatch.klingon { background: linear-gradient(90deg, #5c3a1e, #c48a4a); }
    .swatch.predator { background: linear-gradient(90deg, #2a4030, #7cff9e); }

    #hint {
      font-size: clamp(0.6rem, 1.1vw, 0.68rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.35;
      text-align: right;
    }

  /* —— Vignette & film grain —— */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(ellipse 80% 70% at 50% 45%,
        transparent 30%,
        rgba(0,0,0,0.5) 70%,
        rgba(0,0,0,0.92) 100%);
    }

    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain 0.5s steps(2) infinite;
    }

    @keyframes grain {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-2%, 1%); }
      100% { transform: translate(1%, -1%); }
    }

    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      opacity: 0.4;
    }

    @media (prefers-reduced-motion: reduce) {
      #seam-glow { animation: none; }
      #grain { animation: none; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div class="layer" data-depth="0.02">
      <canvas id="bg-canvas"></canvas>
    </div>
    <div class="layer" data-depth="0.08">
      <canvas id="smoke-canvas"></canvas>
    </div>

    <div id="character-wrap" data-depth="0.35">
      <div id="character-shadow"></div>
      <canvas id="hero-canvas"></canvas>
      <div id="seam-glow"></div>
    </div>

    <div class="layer" data-depth="0.05">
      <div id="rim-light"></div>
    </div>

    <div class="layer" data-depth="0.55">
      <canvas id="particles-canvas"></canvas>
    </div>
  </div>

  <div id="vignette"></div>
  <div id="scanlines"></div>
  <div id="grain"></div>

  <div id="ui">
    <header>
      <h1>Duality — Hybrid Warrior</h1>
      <span class="tag">Sci-Fi Cinematic</span>
    </header>
    <footer>
      <div class="legend">
        <div class="legend-item"><span class="swatch klingon"></span> Klingon — Honor &amp; Steel</div>
        <div class="legend-item"><span class="swatch predator"></span> Yautja — Hunt &amp; Trophy</div>
      </div>
      <p id="hint">Move cursor for parallax · Scroll for depth</p>
    </footer>
  </div>

  <script>
(function () {
  "use strict";

  const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // —— Parallax state ——
  const mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };
  const scrollZ = { v: 0, t: 0 };
  let time = 0;

  const stage = document.getElementById("stage");
  const charWrap = document.getElementById("character-wrap");
  const layers = document.querySelectorAll("[data-depth]");

  function onPointer(e) {
    const w = window.innerWidth;
    const h = window.innerHeight;
  const x = ("clientX" in e ? e.clientX : e.touches[0].clientX) / w;
  const y = ("clientY" in e ? e.clientY : e.touches[0].clientY) / h;
    mouse.tx = x;
    mouse.ty = y;
  }

  window.addEventListener("mousemove", onPointer);
  window.addEventListener("touchmove", onPointer, { passive: true });
  window.addEventListener("wheel", (e) => {
    scrollZ.t = Math.max(-1, Math.min(1, scrollZ.t + e.deltaY * 0.001));
  }, { passive: true });

  function updateParallax() {
    mouse.x += (mouse.tx - mouse.x) * 0.06;
    mouse.y += (mouse.ty - mouse.y) * 0.06;
    scrollZ.v += (scrollZ.t - scrollZ.v) * 0.08;

    const dx = (mouse.x - 0.5) * 2;
    const dy = (mouse.y - 0.5) * 2;

    layers.forEach((el) => {
      const d = parseFloat(el.dataset.depth);
      const px = dx * d * 80;
      const py = dy * d * 50;
      const pz = scrollZ.v * d * 120;
      el.style.transform = `translate3d(${px}px, ${py}px, ${pz}px)`;
    });

    const cd = 0.35;
    const cx = dx * cd * 40;
    const cy = dy * cd * 30;
    const cz = scrollZ.v * cd * 80;
    charWrap.style.transform = `translate(-50%, -50%) translate3d(${cx}px, ${cy}px, ${cz}px) rotateY(${dx * 4}deg) rotateX(${-dy * 3}deg)`;
  }

  // —— Resize helper ——
  function fitCanvas(canvas) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w: rect.width, h: rect.height, dpr };
  }

  const bgCanvas = document.getElementById("bg-canvas");
  const smokeCanvas = document.getElementById("smoke-canvas");
  const heroCanvas = document.getElementById("hero-canvas");
  const particlesCanvas = document.getElementById("particles-canvas");

  // —— Background stars & nebula ——
  const stars = Array.from({ length: 280 }, () => ({
    x: Math.random(),
    y: Math.random(),
    z: Math.random(),
    size: Math.random() * 1.8 + 0.2,
    twinkle: Math.random() * Math.PI * 2
  }));

  function drawBackground(ctx, w, h, t) {
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, "#0a0c14");
    g.addColorStop(0.4, "#12101a");
    g.addColorStop(0.7, "#0d1210");
    g.addColorStop(1, "#050508");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    // Nebula blobs
    const blobs = [
      { x: 0.2, y: 0.3, r: 0.45, c: "rgba(180, 80, 40, 0.08)" },
      { x: 0.78, y: 0.35, r: 0.5, c: "rgba(60, 140, 90, 0.07)" },
      { x: 0.5, y: 0.65, r: 0.55, c: "rgba(40, 30, 80, 0.1)" }
    ];
    blobs.forEach((b) => {
      const ng = ctx.createRadialGradient(b.x * w, b.y * h, 0, b.x * w, b.y * h, b.r * Math.min(w, h));
      ng.addColorStop(0, b.c);
      ng.addColorStop(1, "transparent");
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, w, h);
    });

    stars.forEach((s) => {
      const flicker = 0.5 + 0.5 * Math.sin(t * 2 + s.twinkle);
      ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + flicker * 0.5})`;
      ctx.beginPath();
      ctx.arc(s.x * w, s.y * h, s.size * (0.5 + s.z), 0, Math.PI * 2);
      ctx.fill();
    });

    // Distant wreckage silhouettes
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.moveTo(0, h * 0.72);
    ctx.lineTo(w * 0.15, h * 0.58);
    ctx.lineTo(w * 0.22, h);
    ctx.lineTo(0, h);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w, h * 0.68);
    ctx.lineTo(w * 0.82, h * 0.55);
    ctx.lineTo(w * 0.88, h);
    ctx.lineTo(w, h);
    ctx.fill();
  }

  // —— Smoke layer ——
  const smokePuffs = Array.from({ length: 12 }, (_, i) => ({
    x: Math.random(),
    y: 0.3 + Math.random() * 0.5,
    r: 80 + Math.random() * 120,
    phase: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.3
  }));

  function drawSmoke(ctx, w, h, t) {
    ctx.clearRect(0, 0, w, h);
    smokePuffs.forEach((p, i) => {
      const ox = Math.sin(t * p.speed + p.phase) * 40;
      const x = p.x * w + ox;
      const y = p.y * h;
      const g = ctx.createRadialGradient(x, y, 0, x, y, p.r);
      const warm = i % 2 === 0;
      g.addColorStop(0, warm ? "rgba(120, 60, 30, 0.12)" : "rgba(50, 90, 70, 0.1)");
      g.addColorStop(1, "transparent");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    });
  }

  // —— Hero portrait (Klingon left / Predator right) ——
  function drawHero(ctx, w, h, t) {
    ctx.clearRect(0, 0, w, h);
    const cx = w * 0.5;
    const cy = h * 0.48;
    const scale = Math.min(w, h) * 0.0042;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);

    // Shoulders / torso base
    const torsoGrad = ctx.createLinearGradient(-200, 0, 200, 0);
    torsoGrad.addColorStop(0, "#2a1810");
    torsoGrad.addColorStop(0.48, "#3d2818");
    torsoGrad.addColorStop(0.52, "#1a2e22");
    torsoGrad.addColorStop(1, "#0f1a14");
    ctx.fillStyle = torsoGrad;
    ctx.beginPath();
    ctx.moveTo(-220, 380);
    ctx.bezierCurveTo(-200, 200, -140, 120, -90, 100);
    ctx.lineTo(90, 100);
    ctx.bezierCurveTo(140, 120, 200, 200, 220, 380);
    ctx.closePath();
    ctx.fill();

    // —— LEFT: Klingon armor ——
    ctx.save();
    ctx.beginPath();
    ctx.rect(-300, -400, 300, 900);
    ctx.clip();

    // Battle armor plates
    const armorL = ctx.createLinearGradient(-150, 0, 0, 0);
    armorL.addColorStop(0, "#1a1210");
    armorL.addColorStop(0.5, "#4a3528");
    armorL.addColorStop(1, "#6b4a32");
    ctx.fillStyle = armorL;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-180 + i * 8, 140 + i * 45);
      ctx.lineTo(-20, 130 + i * 48);
      ctx.lineTo(-15, 175 + i * 45);
      ctx.lineTo(-175 + i * 8, 185 + i * 45);
      ctx.closePath();
      ctx.fill();
    }
    // Metallic accents
    ctx.strokeStyle = "rgba(200, 160, 80, 0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-160, 200);
    ctx.lineTo(-40, 195);
    ctx.stroke();
    // Sash
    ctx.fillStyle = "#6b1a1a";
    ctx.beginPath();
    ctx.moveTo(-120, 250);
    ctx.lineTo(-30, 240);
    ctx.lineTo(-25, 320);
    ctx.lineTo(-115, 335);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "rgba(180, 40, 40, 0.4)";
    ctx.fillRect(-110, 255, 70, 8);

    // Neck
    ctx.fillStyle = "#6b4428";
    ctx.beginPath();
    ctx.ellipse(-35, 95, 42, 55, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Head — bronze skin
    const skinL = ctx.createRadialGradient(-50, -80, 10, -40, -60, 120);
    skinL.addColorStop(0, "#a07040");
    skinL.addColorStop(0.6, "#7a5028");
    skinL.addColorStop(1, "#4a3018");
    ctx.fillStyle = skinL;
    ctx.beginPath();
    ctx.ellipse(-42, -70, 75, 95, -0.05, 0, Math.PI * 2);
    ctx.fill();

    // Cranial ridges
    ctx.strokeStyle = "#5a3818";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-95 + i * 12, -130 + i * 3);
      ctx.quadraticCurveTo(-70 + i * 10, -155 - i * 5, -45 + i * 8, -125 - i * 2);
      ctx.stroke();
    }
    ctx.fillStyle = "#4a3018";
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(-78 + i * 14, -138 - i * 4, 8, 14, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Long dark hair (pulled back)
    ctx.fillStyle = "#1a1410";
    ctx.beginPath();
    ctx.moveTo(-120, -100);
    ctx.bezierCurveTo(-150, -20, -140, 80, -100, 200);
    ctx.lineTo(-70, 180);
    ctx.bezierCurveTo(-90, 40, -85, -60, -70, -90);
    ctx.closePath();
    ctx.fill();

    // Mustache & beard
    ctx.fillStyle = "#221810";
    ctx.beginPath();
    ctx.moveTo(-75, -25);
    ctx.quadraticCurveTo(-55, -15, -35, -22);
    ctx.quadraticCurveTo(-50, 5, -70, 15);
    ctx.quadraticCurveTo(-85, 5, -75, -25);
    ctx.fill();
    ctx.fillRect(-72, 10, 35, 45);

    // Fierce eye (left)
    ctx.fillStyle = "#1a1008";
    ctx.beginPath();
    ctx.ellipse(-58, -55, 14, 8, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#c8a060";
    ctx.beginPath();
    ctx.arc(-55, -55, 4, 0, Math.PI * 2);
    ctx.fill();
    // Brow rage
    ctx.strokeStyle = "#3d2814";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(-78, -68);
    ctx.lineTo(-42, -62);
    ctx.stroke();

    // Klingon hand (fist)
    ctx.fillStyle = "#6b4428";
    ctx.beginPath();
    ctx.ellipse(-130, 300, 35, 50, 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // —— RIGHT: Predator ——
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, -400, 300, 900);
    ctx.clip();

    // Hunting armor + netting
    const armorR = ctx.createLinearGradient(0, 0, 180, 0);
    armorR.addColorStop(0, "#2a4035");
    armorR.addColorStop(0.5, "#1a2820");
    armorR.addColorStop(1, "#0f1812");
    ctx.fillStyle = armorR;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(20, 130 + i * 48);
      ctx.lineTo(180 - i * 8, 140 + i * 45);
      ctx.lineTo(175 - i * 8, 185 + i * 45);
      ctx.lineTo(15, 175 + i * 45);
      ctx.closePath();
      ctx.fill();
    }
    // Netting pattern
    ctx.strokeStyle = "rgba(80, 120, 90, 0.35)";
    ctx.lineWidth = 1;
    for (let x = 30; x < 160; x += 18) {
      for (let y = 150; y < 380; y += 18) {
        ctx.strokeRect(x, y, 16, 16);
      }
    }
    // Trophies (skulls/teeth)
    ctx.fillStyle = "rgba(200, 200, 180, 0.5)";
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(50 + i * 28, 220 + (i % 2) * 30, 6, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Neck — scaled
    const neckR = ctx.createLinearGradient(20, 50, 80, 120);
    neckR.addColorStop(0, "#5a7a68");
    neckR.addColorStop(1, "#3a5248");
    ctx.fillStyle = neckR;
    ctx.beginPath();
    ctx.ellipse(38, 95, 40, 52, -0.1, 0, Math.PI * 2);
    ctx.fill();
    drawScales(ctx, 15, 70, 50, 60);

    // Head — mottled reptilian
    const skinR = ctx.createRadialGradient(55, -75, 10, 50, -65, 130);
    skinR.addColorStop(0, "#6a8a78");
    skinR.addColorStop(0.5, "#4a6a58");
    skinR.addColorStop(1, "#2a4038");
    ctx.fillStyle = skinR;
    ctx.beginPath();
    ctx.ellipse(48, -72, 78, 98, 0.05, 0, Math.PI * 2);
    ctx.fill();
    drawScales(ctx, 5, -140, 90, 120);

    // Partial bio-mask (upper right)
    ctx.fillStyle = "rgba(30, 45, 38, 0.85)";
    ctx.beginPath();
    ctx.moveTo(20, -130);
    ctx.lineTo(110, -125);
    ctx.lineTo(105, -60);
    ctx.lineTo(25, -55);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(100, 180, 120, 0.4)";
    ctx.lineWidth = 2;
    ctx.strokeRect(28, -120, 70, 55);

    // Dreadlocks
    const dreadCount = 14;
    for (let i = 0; i < dreadCount; i++) {
      const angle = -0.8 + (i / dreadCount) * 1.2;
      const len = 90 + Math.sin(i * 1.3) * 40;
      const sway = Math.sin(t * 1.5 + i) * 8;
      ctx.strokeStyle = i % 3 === 0 ? "#1a2820" : "#0f1812";
      ctx.lineWidth = 5 + (i % 4);
      ctx.beginPath();
      ctx.moveTo(30 + i * 6, -120);
      ctx.quadraticCurveTo(60 + i * 5 + sway, -40 + i * 3, 80 + i * 4 + sway * 1.5, len);
      ctx.stroke();
      // Beads
      if (i % 3 === 0) {
        ctx.fillStyle = "rgba(180, 60, 40, 0.7)";
        ctx.beginPath();
        ctx.arc(70 + i * 4 + sway, 20 + i * 8, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Mandibles
    ctx.fillStyle = "#3a5248";
    ctx.strokeStyle = "#2a3830";
    ctx.lineWidth = 2;
    [-1, 1].forEach((side) => {
      ctx.beginPath();
      ctx.moveTo(55, -15);
      ctx.quadraticCurveTo(75 * side, 25, 65 * side, 55);
      ctx.quadraticCurveTo(50 * side, 35, 52, -5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });

    // Glowing eye / thermal
    const eyeGlow = 0.7 + 0.3 * Math.sin(t * 3);
    const tg = ctx.createRadialGradient(62, -58, 0, 62, -58, 25);
    tg.addColorStop(0, `rgba(180, 255, 140, ${eyeGlow})`);
    tg.addColorStop(0.4, `rgba(80, 200, 100, ${eyeGlow * 0.5})`);
    tg.addColorStop(1, "transparent");
    ctx.fillStyle = tg;
    ctx.fillRect(40, -80, 50, 50);
    ctx.fillStyle = `rgba(200, 255, 180, ${eyeGlow})`;
    ctx.beginPath();
    ctx.ellipse(64, -56, 10, 12, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Thermal vision overlay hint on cheek
    ctx.fillStyle = `rgba(255, 80, 40, ${0.08 + Math.sin(t * 2) * 0.04})`;
    ctx.fillRect(30, -30, 40, 50);

    // Clawed hand
    ctx.fillStyle = "#4a6a58";
    ctx.beginPath();
    ctx.ellipse(135, 295, 38, 48, -0.2, 0, Math.PI * 2);
    ctx.fill();
    for (let c = 0; c < 4; c++) {
      ctx.fillStyle = "#3a5248";
      ctx.beginPath();
      ctx.moveTo(120 + c * 12, 270);
      ctx.lineTo(125 + c * 12, 240 - c * 5);
      ctx.lineTo(132 + c * 12, 272);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();

    // —— Center fusion seam on face ——
    const seamX = 6;
    const seamGrad = ctx.createLinearGradient(seamX - 8, -200, seamX + 8, 200);
    seamGrad.addColorStop(0, "transparent");
    seamGrad.addColorStop(0.45, "rgba(255, 120, 60, 0.3)");
    seamGrad.addColorStop(0.5, "rgba(255, 255, 220, 0.9)");
    seamGrad.addColorStop(0.55, "rgba(120, 255, 160, 0.35)");
    seamGrad.addColorStop(1, "transparent");
    ctx.fillStyle = seamGrad;
    ctx.fillRect(seamX - 10, -160, 20, 360);

    // Scar tissue along seam
    ctx.strokeStyle = "rgba(80, 50, 40, 0.6)";
    ctx.lineWidth = 1.5;
    for (let y = -140; y < 200; y += 12) {
      ctx.beginPath();
      ctx.moveTo(seamX + Math.sin(y * 0.1 + t) * 2, y);
      ctx.lineTo(seamX + 3 + Math.sin(y * 0.15) * 2, y + 8);
      ctx.stroke();
    }

    // Key light — warm left
    ctx.globalCompositeOperation = "overlay";
    const keyL = ctx.createRadialGradient(-120, -100, 0, -80, -50, 250);
    keyL.addColorStop(0, "rgba(255, 160, 80, 0.35)");
    keyL.addColorStop(1, "transparent");
    ctx.fillStyle = keyL;
    ctx.fillRect(-300, -300, 300, 600);

    // Key light — cool right
    const keyR = ctx.createRadialGradient(120, -90, 0, 90, -40, 260);
    keyR.addColorStop(0, "rgba(100, 220, 140, 0.3)");
    keyR.addColorStop(1, "transparent");
    ctx.fillStyle = keyR;
    ctx.fillRect(0, -300, 300, 600);
    ctx.globalCompositeOperation = "source-over";

    // Rim light top
  const rim = ctx.createLinearGradient(0, -200, 0, 0);
    rim.addColorStop(0, "rgba(255, 255, 255, 0.12)");
    rim.addColorStop(1, "transparent");
    ctx.fillStyle = rim;
    ctx.fillRect(-200, -200, 400, 120);

    ctx.restore();
  }

  function drawScales(ctx, x, y, w, h) {
    const cols = 8;
    const rows = 10;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ox = x + (c / cols) * w + (r % 2) * (w / cols / 2);
        const oy = y + (r / rows) * h;
        ctx.fillStyle = `rgba(0,0,0,${0.08 + (r + c) % 3 * 0.04})`;
        ctx.beginPath();
        ctx.ellipse(ox, oy, w / cols * 0.4, h / rows * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // —— Particles (embers + spores) ——
  const particles = Array.from({ length: 60 }, () => ({
    x: Math.random(),
    y: Math.random(),
    vx: (Math.random() - 0.5) * 0.0004,
    vy: -0.0002 - Math.random() * 0.0005,
    size: Math.random() * 2.5 + 0.5,
    warm: Math.random() > 0.5,
    life: Math.random()
  }));

  function drawParticles(ctx, w, h, t) {
    ctx.clearRect(0, 0, w, h);
    particles.forEach((p) => {
      p.x += p.vx;
      p.y += p.vy;
      p.life += 0.002;
      if (p.y < 0 || p.x < 0 || p.x > 1 || p.life > 1) {
        p.x = 0.35 + Math.random() * 0.3;
        p.y = 0.6 + Math.random() * 0.3;
        p.life = 0;
      }
      const alpha = (1 - p.life) * 0.6;
      ctx.fillStyle = p.warm
        ? `rgba(255, 140, 60, ${alpha})`
        : `rgba(120, 255, 160, ${alpha * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x * w, p.y * h, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // —— Main loop ——
  let bgSize = {}, smokeSize = {}, heroSize = {}, partSize = {};

  function resize() {
    bgSize = fitCanvas(bgCanvas);
    smokeSize = fitCanvas(smokeCanvas);
    heroSize = fitCanvas(heroCanvas);
    partSize = fitCanvas(particlesCanvas);
  }

  function frame(now) {
    if (!prefersReducedMotion) time = now * 0.001;
    else time = 0;

    updateParallax();

    drawBackground(bgSize.ctx, bgSize.w, bgSize.h, time);
    drawSmoke(smokeSize.ctx, smokeSize.w, smokeSize.h, time);
    drawHero(heroSize.ctx, heroSize.w, heroSize.h, time);
    drawParticles(partSize.ctx, partSize.w, partSize.h, time);

    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
  </script>
</body>
